groups:
- name: mentorhub-alerts
  rules:
  # API Health Alerts
  - alert: ServiceDown
    expr: up{job="mentorhub"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "MentorHub API is down"
      description: "Instance {{ $labels.instance }} has been down for more than 1 minute"

  - alert: HighErrorRate
    expr: sum(rate(http_requests_total{status=~"5..", job="mentorhub"}[5m])) / sum(rate(http_requests_total{job="mentorhub"}[5m])) > 0.05
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "High HTTP 5xx error rate"
      description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

  - alert: High4xxRate
    expr: sum(rate(http_requests_total{status=~"4..", job="mentorhub"}[5m])) / sum(rate(http_requests_total{job="mentorhub"}[5m])) > 0.1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High HTTP 4xx error rate"
      description: "Client error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

  # Latency Alerts
  - alert: HighLatencyP95
    expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="mentorhub"}[5m])) by (le)) > 2
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High P95 latency"
      description: "95th percentile latency is {{ $value }}s (threshold: 2s)"

  - alert: HighLatencyP99
    expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="mentorhub"}[5m])) by (le)) > 5
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "High P99 latency"
      description: "99th percentile latency is {{ $value }}s (threshold: 5s)"

  # Resource Alerts
  - alert: HighCPULoad
    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage on {{ $labels.instance }}"
      description: "CPU usage is {{ $value }}% (threshold: 80%)"

  - alert: HighMemoryUsage
    expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High memory usage on {{ $labels.instance }}"
      description: "Memory usage is {{ $value }}% (threshold: 85%)"

  - alert: DiskSpaceLow
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Low disk space on {{ $labels.instance }}"
      description: "Disk space is {{ $value }}% available (threshold: 15%)"

  # Database Alerts
  - alert: PostgresDown
    expr: pg_up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "PostgreSQL is down"
      description: "PostgreSQL instance {{ $labels.instance }} is not responding"

  - alert: PostgresHighConnections
    expr: pg_stat_activity_count / pg_settings_max_connections > 0.9
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "PostgreSQL high connection usage"
      description: "Connection usage is {{ $value | humanizePercentage }} (threshold: 90%)"

  - alert: PostgresHighLatency
    expr: rate(pg_stat_activity_max_tx_duration[5m]) > 300
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "PostgreSQL long running transactions"
      description: "Max transaction duration is {{ $value }}s (threshold: 300s)"

  # Redis Alerts
  - alert: RedisDown
    expr: redis_up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Redis is down"
      description: "Redis instance {{ $labels.instance }} is not responding"

  - alert: RedisHighMemoryUsage
    expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Redis high memory usage"
      description: "Memory usage is {{ $value }}% (threshold: 85%)"

  - alert: RedisLowHitRate
    expr: redis_keyspace_hits_total / (redis_keyspace_hits_total + redis_keyspace_misses_total) < 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Redis low cache hit rate"
      description: "Cache hit rate is {{ $value | humanizePercentage }} (threshold: 80%)"

  # Application Alerts
  - alert: HighAuthFailureRate
    expr: rate(mentorhub_auth_failures_total[5m]) > 10
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High authentication failure rate"
      description: "Auth failures: {{ $value }}/s (threshold: 10/s)"

  - alert: HighRateLimitHits
    expr: rate(mentorhub_rate_limit_exceeded_total[5m]) > 50
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High rate limit exceeded rate"
      description: "Rate limit hits: {{ $value }}/s (threshold: 50/s)"