groups:
  - name: MentorHub Alerts
    interval: 30s
    rules:
      # High CPU Usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 5 minutes on {{ $labels.instance }}"

      # Critical CPU Usage
      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is above 95% for more than 2 minutes on {{ $labels.instance }}"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% for more than 5 minutes on {{ $labels.instance }}"

      # Critical Memory Usage
      - alert: CriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is above 95% for more than 2 minutes on {{ $labels.instance }}"

      # High Error Rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 1% for more than 5 minutes"

      # Critical Error Rate
      - alert: CriticalErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is above 5% for more than 2 minutes"

      # High Response Time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is above 1s for more than 5 minutes"

      # Service Down
      - alert: ServiceDown
        expr: up{job="mentorhub"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MentorHub service is down"
          description: "The service {{ $labels.job }} on {{ $labels.instance }} is down"

      # Redis Down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis service is down"
          description: "Redis on {{ $labels.instance }} is down"

      # PostgreSQL Down
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL service is down"
          description: "PostgreSQL on {{ $labels.instance }} is down"

      # Disk Space Low
      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space detected"
          description: "Disk usage is above 85% on {{ $labels.instance }} ({{ $labels.mountpoint }})"

      # Container Restart
      - alert: ContainerRestart
        expr: rate(container_last_seen{name=~".+"}[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Container restarting frequently"
          description: "Container {{ $labels.name }} is restarting frequently"

  - name: MentorHub Application Alerts
    interval: 30s
    rules:
      # Backend High Error Rate
      - alert: BackendHighErrorRate
        expr: sum(rate(http_requests_total{status=~"5..",job="backend"}[5m])) / sum(rate(http_requests_total{job="backend"}[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Backend error rate > 5%"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # Backend High Latency
      - alert: BackendHighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="backend"}[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Backend p95 latency > 1s"
          description: "95th percentile latency is {{ $value | humanizeDuration }}"

      # Database Connections High
      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ PostgreSQL connections > 80%"
          description: "Database connection usage is {{ $value | humanizePercentage }}"

      # Redis High Memory
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Redis memory usage > 90%"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      # Celery Task Failure
      - alert: CeleryTaskFailure
        expr: rate(celery_task_failed_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Celery task failure rate high"
          description: "Task failure rate is {{ $value }} failures/sec"

  - name: MentorHub Business Metrics
    interval: 1m
    rules:
      # High Payment Failure Rate
      - alert: HighPaymentFailureRate
        expr: sum(rate(payment_failed_total[30m])) / sum(rate(payment_attempts_total[30m])) > 0.2
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Payment failure rate > 20%"
          description: "Payment failure rate is {{ $value | humanizePercentage }}"

      # Low User Registrations
      - alert: LowUserRegistrations
        expr: sum(increase(user_registrations_total[1h])) < 5
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "ℹ️ Low user registrations"
          description: "Less than 5 new users in the last hour"
