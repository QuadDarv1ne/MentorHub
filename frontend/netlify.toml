[build]
# Build command
command = "npm install --legacy-peer-deps && npm run build"

# Publish directory (для Next.js + Netlify plugin)
publish = ".next"

[build.environment]
NODE_VERSION = "18"
NPM_VERSION = "10"
NEXT_TELEMETRY_DISABLED = "1"

# Essential plugin for Next.js on Netlify
[[plugins]]
package = "@netlify/plugin-nextjs"

# Redirects for API - укажите URL вашего backend
# Замените YOUR-BACKEND-URL на реальный адрес backend
[[redirects]]
from = "/api/*"
to = "https://YOUR-BACKEND-URL/api/:splat"
status = 200
force = true

# SPA fallback
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache for static
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
