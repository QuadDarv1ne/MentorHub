# Render Configuration
# https://render.com/docs/yaml-spec
# Nginx reverse proxy: Frontend (3000) + Backend (8000) → PORT

services:
  # Backend API Service with Nginx Proxy
  - type: web
    name: mentorhub-backend
    env: python
    region: frankfurt
    plan: starter
    branch: main
    healthCheckPath: /nginx-health
    buildCommand: ""
    startCommand: bash /app/start.sh
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mentorhub-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: mentorhub-redis
          property: connectionString
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: SENTRY_DSN
        sync: false
      - key: AGORA_APP_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  # PostgreSQL Database
  - name: mentorhub-db
    databaseName: mentorhub
    user: mentorhub_user
    plan: starter
    region: frankfurt
    ipAllowList: []

  # Redis Cache (Optional - can be removed if using external Redis)
  - name: mentorhub-redis
    plan: starter
    region: frankfurt
    # Note: Redis on Render requires manual setup in Dashboard
    # Alternative: Use Upstash (free) - see deploy/render/REDIS-SETUP.md
