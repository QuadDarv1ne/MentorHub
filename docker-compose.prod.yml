version: '3.8'

# Production-optimized Docker Compose configuration
# Features: PgBouncer, optimized settings, health checks, resource limits

services:
  # ==================== PGBOUNCER (Connection Pooling) ====================
  pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    container_name: mentorhub-pgbouncer
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mentorhub_user}:${DB_PASSWORD:?DB_PASSWORD required}@postgres:5432/${DB_NAME:-mentorhub}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      MAX_DB_CONNECTIONS: 100
      MAX_USER_CONNECTIONS: 100
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      SERVER_CONNECT_TIMEOUT: 15
      QUERY_TIMEOUT: 0
      CLIENT_IDLE_TIMEOUT: 0
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mentorhub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ==================== DATABASE ====================
  postgres:
    image: postgres:16-alpine
    container_name: mentorhub-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-mentorhub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-mentorhub}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mentorhub_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mentorhub-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=32MB
      -c min_wal_size=2GB
      -c max_wal_size=8GB
      -c max_connections=200
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c log_min_duration_statement=1000
      -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: mentorhub-redis
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mentorhub-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==================== BACKEND ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENVIRONMENT: production
    container_name: mentorhub-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mentorhub_user}:${DB_PASSWORD:?DB_PASSWORD required}@pgbouncer:5432/${DB_NAME:-mentorhub}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ENVIRONMENT: production
      WORKERS: ${WORKERS:-4}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentorhub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    command: >
      gunicorn app.main:app
      --workers ${WORKERS:-4}
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile -
      --error-logfile -
      --log-level info

  # ==================== CELERY WORKER ====================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mentorhub-celery
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mentorhub_user}:${DB_PASSWORD:?DB_PASSWORD required}@pgbouncer:5432/${DB_NAME:-mentorhub}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ENVIRONMENT: production
    depends_on:
      - pgbouncer
      - redis
    networks:
      - mentorhub-network
    restart: unless-stopped
    command: >
      celery -A app.tasks worker
      --loglevel=info
      --concurrency=4
      --pool=threads
      --max-tasks-per-child=1000
      --time-limit=300
      --soft-time-limit=240
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==================== CELERY BEAT ====================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mentorhub-celery-beat
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mentorhub_user}:${DB_PASSWORD:?DB_PASSWORD required}@pgbouncer:5432/${DB_NAME:-mentorhub}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ENVIRONMENT: production
    depends_on:
      - pgbouncer
      - redis
    networks:
      - mentorhub-network
    restart: unless-stopped
    command: celery -A app.tasks beat --loglevel=info
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: mentorhub-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.mentorhub.com}
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - mentorhub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==================== NGINX ====================
  nginx:
    image: nginx:alpine-slim
    container_name: mentorhub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - mentorhub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ==================== BACKUP SERVICE ====================
  backup:
    image: postgres:16-alpine
    container_name: mentorhub-backup
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USER:-mentorhub_user}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      PGDATABASE: ${DB_NAME:-mentorhub}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mentorhub-network
    restart: unless-stopped
    command: >
      sh -c "
      while true; do
        /backup.sh
        sleep 86400
      done
      "
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  mentorhub-network:
    driver: bridge
