[mypy]
python_version = 3.11
ignore_missing_imports = True
follow_imports = normal
check_untyped_defs = True
no_implicit_optional = True
warn_unused_ignores = True
warn_no_return = True
strict_optional = True
explicit_package_bases = True

[mypy-app.models.*]
# SQLAlchemy Column[X] descriptor false positives - runtime-correct
disable_error_code = assignment, arg-type, var-annotated, return-value

[mypy-app.api.*]
# Column[X] attribute access in API layer
disable_error_code = assignment, arg-type, return-value

[mypy-app.services.*]
# Column[X] attribute access in service layer
disable_error_code = assignment, arg-type, return-value

[mypy-app.utils.*]
# Column[X] attribute access in utility layer
disable_error_code = assignment, arg-type

[mypy-app.dependencies]
# Column[int] | None return type
disable_error_code = return-value
