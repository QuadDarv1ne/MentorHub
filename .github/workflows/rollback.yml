# GitHub Actions Rollback Workflow
# Быстрый откат к предыдущей стабильной версии

name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Environment to rollback'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      target_version:
        description: 'Git tag or commit SHA to rollback to (leave empty for previous)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    
    environment:
      name: ${{ github.event.inputs.target_environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine target version
        id: target
        run: |
          if [ -z "${{ github.event.inputs.target_version }}" ]; then
            # Get previous stable version
            echo "version=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo 'previous')" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.target_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull previous image
        run: |
          echo "Rolling back to version: ${{ steps.target.outputs.version }}"
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.target.outputs.version }}

      - name: Deploy rollback
        run: |
          echo "Deploying rollback to ${{ github.event.inputs.target_environment }}..."
          echo "Target version: ${{ steps.target.outputs.version }}"
          # Здесь можно добавить деплой на ваш сервер
          # Например, через SSH, Kubernetes, или облачный API
          
      - name: Health check
        run: |
          echo "Running post-rollback health checks..."
          # curl -f ${{ env.STAGING_URL }}/health || exit 1
          
      - name: Notify rollback complete
        run: |
          echo "🔄 Rollback completed successfully!"
          echo "Environment: ${{ github.event.inputs.target_environment }}"
          echo "Version: ${{ steps.target.outputs.version }}"
