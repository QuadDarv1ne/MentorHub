name: Lighthouse Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build Next.js application
      working-directory: ./frontend
      run: npm run build

    - name: Export static site
      working-directory: ./frontend
      run: npm run export

    - name: Run Lighthouse CI
      working-directory: ./frontend
      run: npm run lighthouse

    - name: Upload Lighthouse reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: lighthouse-reports
        path: frontend/.lighthouseci/reports/
        retention-days: 30

    - name: Comment PR with results
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Read Lighthouse report
          const reportPath = './frontend/.lighthouseci/reports/report.html';
          if (fs.existsSync(reportPath)) {
            const report = fs.readFileSync(reportPath, 'utf8');
            const match = report.match(/<title>(.*?)<\/title>/);
            const title = match ? match[1] : 'Lighthouse Report';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Lighthouse Audit Complete\n\n${title}\n\nReport uploaded as artifact.`
            });
          }
