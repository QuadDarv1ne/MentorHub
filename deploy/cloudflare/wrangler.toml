# Cloudflare Pages Configuration
# https://developers.cloudflare.com/pages/

# Build settings
build:
  # Build command
  command: "cd frontend && npm install && npm run build"
  
  # Output directory
  path: "frontend/.next"
  
  # Root directory
  root: "frontend"
  
  # Environment variables
  environment:
    NODE_VERSION: "18"
    NEXT_TELEMETRY_DISABLED: "1"
    
# Deployment settings
deploy:
  # Production branch
  production_branch: main
  
  # Preview deployments
  preview_branches:
    enabled: true
    auto_deploy: true
    
# Functions (Cloudflare Workers)
functions:
  # Functions directory
  directory: "frontend/functions"
  
  # Node.js compatibility
  nodejs_compat: true
  
# Routes and redirects
routes:
  # API proxy
  - pattern: "/api/*"
    to: "https://api.mentorhub.com/api/:splat"
    status: 200
    
  # SPA fallback
  - pattern: "/*"
    to: "/index.html"
    status: 200
    
# Security headers
headers:
  - pattern: "/*"
    headers:
      X-Frame-Options: "DENY"
      X-Content-Type-Options: "nosniff"
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "camera=(), microphone=(), geolocation=()"
      Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
      
  - pattern: "/static/*"
    headers:
      Cache-Control: "public, max-age=31536000, immutable"
      
# Cache rules
cache:
  - pattern: "/static/*"
    ttl: 31536000
    
  - pattern: "/*"
    ttl: 3600
    
# Environment overrides
environments:
  production:
    build:
      environment:
        NEXT_PUBLIC_API_URL: "https://api.mentorhub.com"
        NODE_ENV: "production"
        
  staging:
    build:
      environment:
        NEXT_PUBLIC_API_URL: "https://staging-api.mentorhub.com"
        NODE_ENV: "staging"
    deploy:
      production_branch: staging
