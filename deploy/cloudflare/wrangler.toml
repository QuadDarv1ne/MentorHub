# Cloudflare Pages Configuration
# https://developers.cloudflare.com/pages/
#
# Быстрый старт:
# 1. npm install -g wrangler
# 2. wrangler login
# 3. ./deploy/cloudflare/deploy.sh

name = "mentorhub-frontend"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Build settings
[build]
command = "cd frontend && npm install && npm run build"
build_caching = true

# Pages deployment settings
[site]
bucket = "./frontend/.next"

# Environment variables
[vars]
NEXT_TELEMETRY_DISABLED = "1"
NODE_ENV = "production"

# Production environment
[env.production]
vars = { NEXT_PUBLIC_API_BASE_URL = "https://mentorhub-api.onrender.com/api/v1", NEXT_PUBLIC_SITE_URL = "https://mentorhub.pages.dev" }

# Staging environment
[env.staging]
vars = { NEXT_PUBLIC_API_BASE_URL = "https://staging-mentorhub.onrender.com/api/v1", NEXT_PUBLIC_SITE_URL = "https://staging-mentorhub.pages.dev" }
