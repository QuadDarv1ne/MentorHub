[build]
# Build command for Next.js
command = "cd frontend && npm install && npm run build"

# Publish directory
publish = "frontend/.next"

# Base directory for build
base = "frontend"

[build.environment]
NODE_VERSION = "18"
NPM_VERSION = "9"
NEXT_TELEMETRY_DISABLED = "1"

# Environment variables
[build.environment.NEXT_PUBLIC_API_URL]
production = "https://api.mentorhub.com"
staging = "https://staging-api.mentorhub.com"
development = "http://localhost:8000"

# Functions (serverless)
[functions]
directory = "frontend/netlify/functions"
node_bundler = "esbuild"

# Plugins
[[plugins]]
package = "@netlify/plugin-nextjs"

# Redirects for API proxy
[[redirects]]
from = "/api/*"
to = "https://api.mentorhub.com/api/:splat"
status = 200
force = true
headers = { X-Forwarded-Host = "api.mentorhub.com" }

# Redirects for SPA
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
condition = { status = 404 }

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache headers for static assets
[[headers]]
for = "/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Deploy contexts
[context.production]
command = "cd frontend && npm run build"
publish = "frontend/.next"

[context.production.environment]
NEXT_PUBLIC_API_URL = "https://api.mentorhub.com"
NODE_ENV = "production"

[context.staging]
command = "cd frontend && npm run build"
publish = "frontend/.next"

[context.staging.environment]
NEXT_PUBLIC_API_URL = "https://staging-api.mentorhub.com"
NODE_ENV = "staging"

[context.deploy-preview]
command = "cd frontend && npm run build"
publish = "frontend/.next"

[context.branch-deploy]
command = "cd frontend && npm run build"
publish = "frontend/.next"

# Dev server
[dev]
command = "cd frontend && npm run dev"
port = 3000
publish = "frontend/.next"
autoLaunch = false
