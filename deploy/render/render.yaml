# Render Configuration - Исправленная версия
# https://render.com/docs/blueprints

services:
  # ==================== BACKEND ====================
  - type: web
    name: mentorhub-backend
    env: python
    region: frankfurt
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mentorhub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mentorhub-redis
          property: connectionString
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        value: mentorhub-bucket
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_SENDER
        value: noreply@mentorhub.com
    disk:
      name: backend-data
      mountPath: /app/data
      sizeGB: 10

  # ==================== FRONTEND ====================
  - type: web
    name: mentorhub-frontend
    env: node
    region: frankfurt
    plan: starter
    branch: main
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      # NEXT_PUBLIC_API_URL нужно указать вручную после создания backend
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_AGORA_APP_ID
        sync: false

  # ==================== CELERY WORKER ====================
  - type: worker
    name: mentorhub-worker
    env: python
    region: frankfurt
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks worker --loglevel=info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mentorhub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mentorhub-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production

  # ==================== CELERY BEAT ====================
  - type: worker
    name: mentorhub-beat
    env: python
    region: frankfurt
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks beat --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mentorhub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mentorhub-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production

  # ==================== REDIS ====================
  - type: redis
    name: mentorhub-redis
    region: frankfurt
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all

databases:
  - name: mentorhub-db
    databaseName: mentorhub
    user: mentorhub_user
    ipAllowList: []
    region: frankfurt
    plan: starter
    diskSizeGB: 10
